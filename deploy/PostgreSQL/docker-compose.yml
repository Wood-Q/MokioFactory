services:
  postgres:
    image: postgres:17-alpine
    container_name: mokio-postgres
    environment:
      POSTGRES_USER: mokio
      POSTGRES_PASSWORD: mokio123456
      POSTGRES_DB: mokiofactory
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mokio -d mokiofactory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  data:
